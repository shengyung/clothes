# 生產環境覆蓋：移除 MinIO，改用 AWS S3
# 使用方式：docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  backend:
    restart: always
    environment:
      - USE_S3=true
      - MINIO_ENDPOINT=
      # 寫死在 compose 裡而非依賴 EC2 .env，避免漏設定：
      # SQLite 檔案要落在下面掛載的 sqlite_data volume（/app/data）裡，
      # 否則重新部署 container 時資料會整個消失（見 docs/architecture.md 的已知問題記錄）。
      - DATABASE_URL=sqlite:////app/data/tryon.db
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
      - sqlite_data:/app/data
    depends_on:
      minio:
        condition: service_completed_successfully
        required: false

  frontend:
    restart: always
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_URL=https://shapeonyou.io
    environment:
      - NEXTAUTH_URL=https://shapeonyou.io

  minio:
    image: alpine
    command: ["sh", "-c", "exit 0"]
    healthcheck:
      test: ["CMD", "true"]
      interval: 1s
      retries: 1

volumes:
  sqlite_data:
